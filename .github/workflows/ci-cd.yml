name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up PHP with Composer and PHP-Scoper
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          tools: composer, php-scoper
          coverage: none

      - name: Validate Composer configuration
        run: composer --no-ansi validate

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          cache: "npm"
          node-version-file: '.nvmrc'

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: |
          npm ci
          composer install --no-ansi --no-interaction --no-progress --prefer-dist

      - name: Lint PHP
        run: composer run lint

      - name: Lint JavaScript and CSS
        run: |
          npm run lint:js
          npm run lint:css

      - name: Build front-end assets
        run: npm run build

      - name: Upload folders
        uses: actions/upload-artifact@v7
        with:
          name: plugin-deps
          path: |
            ./build
            ./vendor
            ./third-party

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint-and-build
    strategy:
      matrix:
        php-version: ["7.4", "8.0", "8.1", "8.2", "8.3", "8.4", "8.5"]
    name: PHP ${{ matrix.php-version }} tests
    services:
      mysql:
        image: mariadb:lts
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306
        options: --health-cmd="healthcheck.sh --connect --innodb_initialized" --health-interval=10s --health-timeout=5s --health-retries=10 --health-start-period=60s
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup WP test environment
        uses: ./.github/actions/setup-wp-tests
        with:
          php-version: ${{ matrix.php-version }}
          mysql-port: ${{ job.services.mysql.ports['3306'] }}

      - name: Show PHP version
        run: php -v

      - name: Run tests
        run: vendor/bin/phpunit --do-not-cache-result --testsuite unit

  compatibility-tests:
    runs-on: ubuntu-latest
    needs: lint-and-build
    name: Compatibility tests
    services:
      mysql:
        image: mariadb:lts
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306
        options: --health-cmd="healthcheck.sh --connect --innodb_initialized" --health-interval=10s --health-timeout=5s --health-retries=10 --health-start-period=60s
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup WP test environment
        uses: ./.github/actions/setup-wp-tests
        with:
          php-version: "8.2"
          mysql-port: ${{ job.services.mysql.ports['3306'] }}

      - name: Cache compatibility plugins
        uses: actions/cache@v5
        with:
          path: /tmp/compat-plugins
          key: compat-plugins-woocommerce-9.x-yoast-23.x

      - name: Download and install compatibility plugins
        run: |
          mkdir -p /tmp/compat-plugins
          WP_PLUGINS_DIR=$(find /tmp/wordpress -type d -name plugins | head -1)
          echo "Installing compatibility plugins to: $WP_PLUGINS_DIR"

          if [ ! -f /tmp/compat-plugins/woocommerce.zip ]; then
            curl -L https://downloads.wordpress.org/plugin/woocommerce.latest-stable.zip \
              -o /tmp/compat-plugins/woocommerce.zip
          fi
          unzip -q /tmp/compat-plugins/woocommerce.zip -d $WP_PLUGINS_DIR

          if [ ! -f /tmp/compat-plugins/wordpress-seo.zip ]; then
            curl -L https://downloads.wordpress.org/plugin/wordpress-seo.latest-stable.zip \
              -o /tmp/compat-plugins/wordpress-seo.zip
          fi
          unzip -q /tmp/compat-plugins/wordpress-seo.zip -d $WP_PLUGINS_DIR

      - name: Run compatibility tests
        run: vendor/bin/phpunit --do-not-cache-result --testsuite unit

  integration-tests:
    runs-on: ubuntu-latest
    needs: lint-and-build
    name: Integration tests
    services:
      mysql:
        image: mariadb:lts
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306
        options: --health-cmd="healthcheck.sh --connect --innodb_initialized" --health-interval=10s --health-timeout=5s --health-retries=10 --health-start-period=60s
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup WP test environment
        uses: ./.github/actions/setup-wp-tests
        with:
          php-version: "8.2"
          mysql-port: ${{ job.services.mysql.ports['3306'] }}

      - name: Run integration tests
        run: vendor/bin/phpunit --do-not-cache-result --testsuite integration