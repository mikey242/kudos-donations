name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up PHP with Composer and PHP-Scoper
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          tools: composer, php-scoper
          coverage: none

      - name: Validate Composer configuration
        run: composer --no-ansi validate

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          cache: "npm"
          node-version-file: '.nvmrc'

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: |
          npm ci
          composer install --no-ansi --no-interaction --no-progress --prefer-dist

      - name: Lint PHP
        run: composer run lint

      - name: Lint JavaScript and CSS
        run: |
          npm run lint:js
          npm run lint:css

      - name: Build front-end assets
        run: npm run build

  test-job:
    runs-on: ubuntu-latest
    needs: lint-and-build
    strategy:
      matrix:
        php-version: ["7.4", "8.0", "8.1", "8.2", "8.3", "8.4", "8.5"]
    name: PHP ${{ matrix.php-version }} tests
    services:
      mysql:
        image: mariadb:lts
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306
        options: --health-cmd="healthcheck.sh --connect --innodb_initialized" --health-interval=10s --health-timeout=5s --health-retries=10 --health-start-period=60s
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}

      - name: Download plugin dependencies
        uses: actions/download-artifact@v8
        with:
          name: plugin-deps
          path: ./

      - name: Install subversion
        run: |
          sudo apt-get update -y --allow-releaseinfo-change
          sudo apt-get install -y subversion

      - name: Install tests
        run: |
          sudo curl https://raw.githubusercontent.com/wp-cli/scaffold-command/master/templates/install-wp-tests.sh -o /bin/install-wp-tests.sh
          sudo chmod +x /bin/*.sh
          bash /bin/install-wp-tests.sh wordpress_test root root 127.0.0.1:${{ job.services.mysql.ports['3306'] }} latest true

      - name: Show PHP version
        run: php -v

      - name: Fix permissions for PHPUnit
        run: chmod +x vendor/bin/phpunit

      - name: Run tests
        run: vendor/bin/phpunit --do-not-cache-result
